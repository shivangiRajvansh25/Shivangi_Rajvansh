<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Quiz Game </title>
    <link rel="stylesheet" href="QuizGame.css" />
  </head>
  <body>
  <div class="main">
    <div class="quiz-container">
        <div class="timer">Time Left: <span id="time">30</span>s</div>
        <div class="question">Question will appear here</div>
        <div class="options"></div>
        <div class="result">Your score: <span id="score">0</span></div>

        <div id="summary" class="summary-container"><h1 style="text-align: center;">SUMMARY<h1></div>

        <div class="div-flex">
          <button class="restart-btn">Restart Quiz</button>
          <button class="summaryBtn">Result Summary</button>
      </div>
       
        
    </div>
  </div>
     <script src="QuizGame.js"></script>
  </body>
</html>
